<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoDispatch — Spatial Emergency Response</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Loading Screen ─────────────────────────────────────────── -->
  <div id="loading-screen">
    <canvas id="loading-canvas"></canvas>
    <div id="loading-text">
      <div id="typewriter"></div>
    </div>
  </div>

  <!-- ── Main App ───────────────────────────────────────────────── -->
  <div id="app" class="hidden">

    <!-- Three.js header particle canvas (z=0) -->
    <canvas id="particle-canvas"></canvas>

    <!-- Left Panel (z=3) -->
    <aside id="panel">

      <!-- A — Header -->
      <header id="panel-header">
        <h1>Geo<span>Dispatch</span></h1>
        <p class="subtitle">Pune Emergency Facilities · ADS Project</p>
      </header>

      <!-- B — Stats -->
      <section id="stats-grid">
        <div class="stat-card" id="stat-total">
          <span class="stat-label">Total Facilities</span>
          <span class="stat-value" id="val-total">—</span>
        </div>
        <div class="stat-card" id="stat-online">
          <span class="stat-label">Online</span>
          <span class="stat-value" id="val-online">—</span>
        </div>
        <div class="stat-card" id="stat-offline">
          <span class="stat-label">Offline</span>
          <span class="stat-value" id="val-offline">—</span>
        </div>
        <div class="stat-card" id="stat-overloaded">
          <span class="stat-label">Overloaded</span>
          <span class="stat-value" id="val-overloaded">—</span>
        </div>
      </section>

      <!-- D — Mode switcher -->
      <div id="mode-bar">
        <button class="mode-btn active" data-mode="QUERY">Query</button>
        <button class="mode-btn" data-mode="EDIT">Edit</button>
        <button class="mode-btn" data-mode="OPTIMISE">Optimise</button>
      </div>

      <!-- Mode panels -->
      <div id="mode-query" class="mode-panel active">
        <p class="hint">Click the map to find the nearest facility.</p>
        <div id="query-result" class="result-box hidden"></div>
        <div class="field-row">
          <label>k-NN count</label>
          <input id="knn-k" type="number" value="5" min="1" max="20" />
        </div>
        <button class="action-btn" id="btn-knn">Find k Nearest</button>
        <div id="knn-result" class="result-box hidden"></div>
      </div>

      <div id="mode-edit" class="mode-panel">
        <p class="hint">Click the map to place a new facility.</p>
        <div class="field-row">
          <label>Name</label>
          <input id="new-fac-name" type="text" placeholder="e.g. Civil Hospital" />
        </div>
        <div class="field-row">
          <label>Type</label>
          <select id="new-fac-type">
            <option value="hospital">Hospital</option>
            <option value="fire_station">Fire Station</option>
          </select>
        </div>
        <button class="action-btn" id="btn-place">Place Facility</button>
        <button class="action-btn danger" id="btn-remove">Remove Selected</button>
      </div>

      <div id="mode-optimise" class="mode-panel">
        <p class="hint">Run Lloyd's relaxation to optimise facility placement.</p>
        <div class="field-row">
          <label>Iterations</label>
          <input id="opt-iter" type="number" value="10" min="1" max="200" />
        </div>
        <div class="field-row">
          <label>Threshold (m)</label>
          <input id="opt-thresh" type="number" value="50" min="1" />
        </div>
        <button class="action-btn" id="btn-optimise">Run Lloyd's</button>
        <button class="action-btn" id="btn-coverage">Show Coverage Map</button>
        <button class="action-btn" id="btn-benchmark">Benchmark Report</button>
      </div>

      <!-- C — Facility list -->
      <div id="facility-list-header">
        <span>Facilities</span>
        <input id="fac-search" type="search" placeholder="Search…" />
      </div>
      <div id="facility-list"></div>

    </aside>

    <!-- Map container (z=1) -->
    <div id="map-container">
      <div id="map"></div>
    </div>

    <!-- Detail Drawer -->
    <div id="detail-drawer" class="hidden">
      <button id="drawer-close">✕</button>
      <h3 id="drawer-name"></h3>
      <p id="drawer-type"></p>
      <div id="drawer-state-btns"></div>
    </div>

  </div>

  <!-- Benchmark Modal -->
  <div id="bench-modal" class="modal hidden">
    <div class="modal-box">
      <button class="modal-close" id="bench-close">✕</button>
      <h2>Benchmark Report</h2>
      <canvas id="bench-chart"></canvas>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/loading.js"></script>
  <script src="js/map.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
