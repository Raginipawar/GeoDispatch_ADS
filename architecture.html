<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    padding: 40px;
  }
  h1 {
    font-size: 20px;
    font-weight: 800;
    color: #111;
    margin-bottom: 28px;
  }
</style>
</head>
<body>
<h1>GeoDispatch — System Architecture</h1>

<!--
  Serpentine flow:
  Row 1 (L→R): OSM Data Loader → ctypes Bridge → KD-Tree Engine (C)
                                                         ↓
  Row 2 (R→L): Facility State FSM ← FastAPI REST API ← Voronoi / Fortune's (C)
       ↓
  Row 3 (L→R): Lloyd's Algorithm → Geometry / Clipping → Frontend Dashboard
-->

<svg width="760" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- ── ROW 1  y: 10 → 130 ── -->
  <rect x="10"  y="10" width="190" height="120" rx="10" fill="#1c1c1c"/>
  <text x="105" y="40" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial" font-size="13" font-weight="bold">OSM Data Loader</text>
  <text x="105" y="57" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">Overpass API → 644 facilities</text>
  <text x="105" y="72" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">equirectangular projection</text>
  <text x="105" y="87" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">writes pune_facilities.json</text>

  <rect x="285" y="10" width="190" height="120" rx="10" fill="#1c1c1c"/>
  <text x="380" y="40" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial" font-size="13" font-weight="bold">ctypes Bridge</text>
  <text x="380" y="57" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">Loads geodispatch.dll</text>
  <text x="380" y="72" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">maps PointT / DCEL structs</text>
  <text x="380" y="87" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">owns memory lifecycle</text>

  <rect x="560" y="10" width="190" height="120" rx="10" fill="#1c1c1c"/>
  <text x="655" y="40" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial" font-size="13" font-weight="bold">KD-Tree Engine (C)</text>
  <text x="655" y="57" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">kd_build O(n log n)</text>
  <text x="655" y="72" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">kd_nearest, k-NN O(log n)</text>
  <text x="655" y="87" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">soft-delete, rebalance</text>

  <!-- ── ROW 2  y: 190 → 310 ── -->
  <rect x="10"  y="190" width="190" height="120" rx="10" fill="#1c1c1c"/>
  <text x="105" y="220" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial" font-size="13" font-weight="bold">Facility State FSM</text>
  <text x="105" y="237" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">ONLINE / OFFLINE /</text>
  <text x="105" y="252" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">OVERLOADED transitions</text>
  <text x="105" y="267" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">syncs kd_delete / kd_insert</text>

  <rect x="285" y="190" width="190" height="120" rx="10" fill="#1c1c1c"/>
  <text x="380" y="220" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial" font-size="13" font-weight="bold">FastAPI REST Backend</text>
  <text x="380" y="237" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">/query-nearest  /query-knn</text>
  <text x="380" y="252" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">/optimise  /set-state</text>
  <text x="380" y="267" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">/coverage-map  /facilities</text>

  <rect x="560" y="190" width="190" height="120" rx="10" fill="#1c1c1c"/>
  <text x="655" y="220" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial" font-size="13" font-weight="bold">Voronoi / Fortune's (C)</text>
  <text x="655" y="237" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">O(n log n) sweep line</text>
  <text x="655" y="252" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">AVL beach line</text>
  <text x="655" y="267" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">DCEL half-edge structure</text>

  <!-- ── ROW 3  y: 370 → 490 ── -->
  <rect x="10"  y="370" width="190" height="120" rx="10" fill="#1c1c1c"/>
  <text x="105" y="400" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial" font-size="13" font-weight="bold">Lloyd's Algorithm (C)</text>
  <text x="105" y="417" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">centroid relaxation per cell</text>
  <text x="105" y="432" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">rebuilds KD-tree + DCEL</text>
  <text x="105" y="447" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">until convergence</text>

  <rect x="285" y="370" width="190" height="120" rx="10" fill="#1c1c1c"/>
  <text x="380" y="400" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial" font-size="13" font-weight="bold">Geometry Layer (C)</text>
  <text x="380" y="417" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">Sutherland-Hodgman clipping</text>
  <text x="380" y="432" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">Shoelace area formula</text>
  <text x="380" y="447" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">max-heap underserved flag</text>

  <rect x="560" y="370" width="190" height="120" rx="10" fill="#1c1c1c"/>
  <text x="655" y="400" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial" font-size="13" font-weight="bold">Frontend Dashboard</text>
  <text x="655" y="417" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">Leaflet map + D3 Voronoi</text>
  <text x="655" y="432" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">Three.js + GSAP animations</text>
  <text x="655" y="447" text-anchor="middle" fill="#999" font-family="Segoe UI,Arial" font-size="10">QUERY / EDIT / OPTIMISE</text>

  <!-- ════ ARROWS ════ -->

  <!-- R1: Box1 → Box2  (data loaded by bridge) -->
  <line x1="202" y1="70" x2="278" y2="70" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- R1: Box2 → Box3  (bridge builds KD-tree) -->
  <line x1="477" y1="70" x2="553" y2="70" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box3 ↓ Box6  (same sites also build Voronoi) -->
  <line x1="655" y1="132" x2="655" y2="183" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- R2: Box6 → Box5  (Voronoi results exposed via FastAPI) -->
  <line x1="558" y1="250" x2="482" y2="250" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- R2: Box5 → Box4  (FastAPI manages facility states) -->
  <line x1="283" y1="250" x2="207" y2="250" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box4 ↓ Box7  (FSM triggers optimise → Lloyd's) -->
  <line x1="105" y1="312" x2="105" y2="363" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- R3: Box7 → Box8  (Lloyd's uses Geometry for clipping+area) -->
  <line x1="202" y1="430" x2="278" y2="430" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- R3: Box8 → Box9  (results sent to Frontend) -->
  <line x1="477" y1="430" x2="553" y2="430" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

</svg>

</body>
</html>
